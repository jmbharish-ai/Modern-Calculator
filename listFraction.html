<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>List Fraction</title>
        <link rel="stylesheet" href="listFraction.css">
        <script src="listFraction.js"></script>
        <link rel="icon" type="image/png" href="favicon.png">
    </head>
    <body>
        <h1>List Fraction</h1>
        <button style="width: 200px;" onclick="deleteAll()">Delete All</button>
        <br><br>
        <button id="first" style="width: 400px;"></button>
        <br>
        <button id="operation" style="width: 50px;"></button>
        <br>
        <button id="next" style="width: 400px;"></button>
        <br>
        <button style="width: 50px;" onclick="calculate()">=</button>
        <br>
        <button id="answer" style="width: 400px;"></button>
        <br><br>

        <div>
            <button onclick="typeDigit('0')">0</button>
            <button onclick="typeDigit('1')">1</button>
            <button onclick="typeDigit('2')">2</button>
            <button onclick="typeDigit('3')">3</button>
            <button onclick="typeDigit('4')">4</button>
            <button onclick="typeDigit('5')">5</button>
            <button onclick="typeDigit('6')">6</button>
            <button onclick="typeDigit('7')">7</button>
            <button onclick="typeDigit('8')">8</button>
            <button onclick="typeDigit('9')">9</button>
            <br><br>
            <button onclick="typeOperation('+')">+</button>
            <button onclick="typeOperation('-')">-</button>
            <button onclick="typeOperation('×')">×</button>
            <button onclick="typeOperation('÷')">÷</button>
        </div>
        <br>
        <button id="goNext" style="width: 100px;" onclick="termAfter()">Next</button>
        <br>

        <a href="index.html">Home</a>
    </body>
</html>
